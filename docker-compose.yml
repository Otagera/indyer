services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: indyer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-indyer}
      POSTGRES_DB: indyer
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - indyer

  api:
    image: ghcr.io/otagera/indyer-api:latest
    pull_policy: always
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://indyer:${POSTGRES_PASSWORD}@postgres:5432/indyer
      NODE_ENV: production
      PORT: 3001
      CORS_ORIGIN: https://indyer.otagera.xyz
    networks:
      - indyer

  client:
    image: ghcr.io/otagera/indyer-client:latest
    pull_policy: always
    depends_on:
      - api
    environment:
      - API_PROXY_TARGET=http://api:3001
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.indyer-client.rule=Host(`indyer.otagera.xyz`)"
      - "traefik.http.routers.indyer-client.entrypoints=https"
      - "traefik.http.routers.indyer-client.tls=true"
      - "traefik.http.routers.indyer-client.tls.certresolver=letsencrypt"
      - "traefik.http.services.indyer-client.loadbalancer.server.port=5173"
    networks:
      - indyer

volumes:
  pgdata:

networks:
  indyer:
